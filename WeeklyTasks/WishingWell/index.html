<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" type="text/css" media="all">
    <title>Wishing Well</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>
    <h2>A website with a wishing well</h2>
    <div class="wishingWell">
            <div class="blankLeftDiv"></div>
            <div>
                <div class="mainElements">
                    <img src="well.png" alt="A drawing of a wishing well" aria-label="Wishing-Well" class="well">
                    <p>Click the coin to see your fortune!</p>
                    <div class="coin" alt="A coin" aria-label="Coin"></div>
                </div>
            </div>
            <div class="blankRightDiv"></div>
    </div>
</body>
<script src="script.js"> </script> 
</html>
